# Local dev that mirrors production: the app in a container + PostgreSQL,
# exactly like Render runs it (instead of the SQLite fallback).
# Start:  docker compose up --build
# Open:   http://localhost:8010
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: riq
      POSTGRES_PASSWORD: riq
      POSTGRES_DB: restaurantiq
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riq -d restaurantiq"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    ports:
      - "8010:8010"
    environment:
      DATABASE_URL: postgresql://riq:riq@db:5432/restaurantiq
      RIQ_SECRET: dev-secret-change-me
      # Optional: export ANTHROPIC_API_KEY on your machine to enable AI answers.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
